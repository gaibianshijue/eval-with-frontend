<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval Bench — Web Demo</title>
<style>
/* ========== reset & base ========== */
*, *::before, *::after { box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f5f6fa; color: #333; margin: 0; padding: 20px;
}
h1 { font-size: 1.4rem; margin: 0 0 4px; }
.subtitle { color: #666; font-size: .85rem; margin: 0 0 16px; }

/* ========== layout ========== */
.container { max-width: 1100px; margin: 0 auto; }
.row { display: flex; gap: 16px; }
.col-left { flex: 1; min-width: 0; }
.col-right { width: 480px; flex-shrink: 0; display: flex; flex-direction: column; }

/* ========== card ========== */
.card {
    background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    margin-bottom: 12px; overflow: hidden;
}
.card-header {
    background: #f8f9fc; border-bottom: 1px solid #e9ecef;
    padding: 8px 14px; font-size: .85rem; font-weight: 600; color: #444;
}
.card-body { padding: 10px 14px 14px; }

/* ========== form ========== */
.form-group {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
}
.form-group label {
    width: 160px; flex-shrink: 0; font-size: .82rem; color: #555;
}
.form-group input, .form-group select {
    flex: 1; padding: 5px 8px; border: 1px solid #d0d5dd; border-radius: 4px;
    font-size: .82rem; outline: none; transition: border .15s;
}
.form-group input:focus { border-color: #4a7cf7; box-shadow: 0 0 0 2px rgba(74,124,247,.15); }
.form-group input.error { border-color: #e74c3c; }

.form-group-inline {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.form-group-inline label { font-size: .82rem; color: #555; white-space: nowrap; }
.form-group-inline input {
    width: 80px; padding: 5px 8px; border: 1px solid #d0d5dd; border-radius: 4px;
    font-size: .82rem; outline: none;
}
.form-group-inline input:focus { border-color: #4a7cf7; box-shadow: 0 0 0 2px rgba(74,124,247,.15); }

.dynamic-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
}
.dynamic-row input {
    width: 90px; padding: 4px 8px; border: 1px solid #d0d5dd; border-radius: 4px;
    font-size: .82rem; outline: none;
}
.dynamic-row input:focus { border-color: #4a7cf7; }
.dynamic-row .del-btn {
    background: none; border: none; color: #999; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 0 4px;
}
.dynamic-row .del-btn:hover { color: #e74c3c; }
.add-btn {
    background: none; border: 1px dashed #b0b8c4; border-radius: 4px;
    color: #666; cursor: pointer; font-size: .82rem; padding: 3px 12px;
    margin-top: 2px;
}
.add-btn:hover { border-color: #4a7cf7; color: #4a7cf7; }

.checkbox-group {
    display: flex; gap: 16px; padding: 4px 0;
}
.checkbox-group label {
    display: flex; align-items: center; gap: 4px;
    font-size: .82rem; cursor: pointer;
}

/* ========== control bar ========== */
.control-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: #f8f9fc; border-bottom: 1px solid #e9ecef;
}
.btn {
    padding: 6px 18px; border: none; border-radius: 4px;
    font-size: .82rem; font-weight: 500; cursor: pointer; transition: background .15s;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary { background: #4a7cf7; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #3b6aea; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover:not(:disabled) { background: #c0392b; }
.btn-outline { background: #fff; border: 1px solid #d0d5dd; color: #555; }
.btn-outline:hover:not(:disabled) { background: #f0f2f5; }
.btn-sm { padding: 4px 12px; font-size: .78rem; }

/* ========== progress ========== */
.progress-section { padding: 8px 14px 12px; }
.progress-bar-bg {
    height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden; margin-bottom: 6px;
}
.progress-bar-fill {
    height: 100%; width: 0%; background: linear-gradient(90deg, #4a7cf7, #6c5ce7);
    border-radius: 4px; transition: width .5s ease;
}
.progress-info {
    display: flex; justify-content: space-between;
    font-size: .75rem; color: #777;
}
.progress-detail {
    font-size: .75rem; color: #555; line-height: 1.5;
}

/* ========== log ========== */
.log-box {
    flex: 1; min-height: 280px; overflow-y: auto;
    background: #1e1e2e; color: #cdd6f4; font-family: "Cascadia Code", "Fira Code", monospace;
    font-size: .78rem; line-height: 1.55; padding: 10px 14px;
    border-radius: 0 0 8px 8px;
    white-space: pre-wrap; word-break: break-all;
}
.log-box .ts { color: #6c7086; }
.log-box .info { color: #89b4fa; }
.log-box .ok  { color: #a6e3a1; }
.log-box .err { color: #f38ba8; }
.log-box .hl  { color: #f9e2af; }

/* ========== responsive ========== */
@media (max-width: 860px) {
    .row { flex-direction: column; }
    .col-right { width: auto; }
    .form-group { flex-wrap: wrap; }
    .form-group label { width: auto; min-width: 100px; }
}
</style>
</head>
<body>
<div class="container">

<h1>🧪 Eval Bench — Web Demo</h1>
<p class="subtitle">基于 evalscope Python SDK 的批量压测配置 & 运行（v2 / in-process）</p>

<div class="row">

<!-- ========== 左栏：表单 ========== -->
<div class="col-left">

<!-- 基础配置 -->
<div class="card">
<div class="card-header">🔧 基础配置</div>
<div class="card-body">
    <div class="form-group">
        <label for="model_name">模型名称</label>
        <input id="model_name" type="text" placeholder="deepseek-v4-flash">
    </div>
    <div class="form-group">
        <label for="api_url">API URL</label>
        <input id="api_url" type="url" placeholder="http://192.168.7.206:8099/v1/chat/completions">
    </div>
    <div class="form-group">
        <label for="tokenizer_path">Tokenizer 路径（random 必填）</label>
        <input id="tokenizer_path" type="text" placeholder="random 任务必填，如 /ainfs-nv-prod/.../tokenizer">
    </div>
    <div class="form-group">
        <label>API Keys（多用户并发）</label>
        <div style="flex:1;">
            <div id="api-key-container"></div>
            <button class="add-btn" id="add-api-key-btn">+ 添加 API Key</button>
        </div>
    </div>
</div>
</div>

<!-- 数据集配置 -->
<div class="card">
<div class="card-header">📁 数据集配置</div>
<div class="card-body">
    <div class="form-group">
        <label for="openclaw_dataset_path">OpenClaw 数据集路径</label>
        <input id="openclaw_dataset_path" type="text" placeholder="input50.jsonl">
    </div>
    <div class="form-group">
        <label for="openclaw_dataset_name">数据集名称</label>
        <input id="openclaw_dataset_name" type="text" placeholder="line_by_line">
    </div>
</div>
</div>

<!-- 执行参数 -->
<div class="card">
<div class="card-header">⚙️ 执行参数</div>
<div class="card-body">
    <div class="form-group-inline">
        <label>测试重复次数</label>
        <input id="test_repeats" type="number" min="1" value="3">
    </div>
    <div class="form-group-inline">
        <label>LOG_EVERY_N_QUERY</label>
        <input id="log_every_n_query" type="number" min="1" value="500">
    </div>
    <div class="form-group-inline">
        <label>PREFIX_LENGTH</label>
        <input id="prefix_length" type="number" min="0" value="0">
    </div>
    <div class="form-group-inline">
        <label>测试间隔 (s)</label>
        <input id="wait_between_tests" type="number" min="0" value="60">
    </div>
</div>
</div>

<!-- 数组类参数 -->
<div class="card">
<div class="card-header">📋 任务与并发配置</div>
<div class="card-body">

    <!-- task_types -->
    <div class="form-group-inline" style="margin-bottom:8px;">
        <label>任务类型</label>
        <div class="checkbox-group">
            <label><input type="checkbox" class="task-type-cb" value="random" checked> random</label>
            <label><input type="checkbox" class="task-type-cb" value="openclaw"> openclaw</label>
        </div>
    </div>

    <!-- input_output_groups -->
    <div style="margin-bottom:10px;">
        <div style="font-size:.82rem;color:#555;margin-bottom:4px;">输入/输出长度组（input → output）</div>
        <div id="io-group-container"></div>
        <button class="add-btn" id="add-io-btn">+ 添加行</button>
    </div>

    <!-- concurrency_request_groups -->
    <div>
        <div style="font-size:.82rem;color:#555;margin-bottom:4px;">并发/请求数（parallel → number）</div>
        <div id="cr-group-container"></div>
        <button class="add-btn" id="add-cr-btn">+ 添加行</button>
    </div>

</div>
</div>

</div><!-- /col-left -->

<!-- ========== 右栏：控制 + 进度 + 日志 ========== -->
<div class="col-right">

<!-- 控制 -->
<div class="card">
<div class="control-bar">
    <button class="btn btn-primary" id="btn-start">▶ 启动</button>
    <button class="btn btn-danger" id="btn-stop" disabled>⏹ 停止</button>
    <button class="btn btn-outline btn-sm" id="btn-refresh">↻ 状态</button>
    <span id="state-label" style="font-size:.78rem;color:#888;">空闲</span>
</div>

<!-- 进度 -->
<div class="progress-section">
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-info">
        <span id="progress-text">0/0 (0%)</span>
        <span id="progress-eta">--</span>
    </div>
    <div class="progress-detail" id="progress-detail"></div>
</div>
</div>

<!-- 日志 -->
<div class="card" style="display:flex;flex-direction:column;flex:1;">
<div class="card-header" style="display:flex;justify-content:space-between;">
    <span>📜 日志</span>
    <span id="log-count" style="font-weight:400;color:#999;font-size:.78rem;">0 行</span>
</div>
<div class="log-box" id="log-box">
    <div class="info">--- 等待启动 ---</div>
</div>
</div>

</div><!-- /col-right -->

</div><!-- /row -->
</div><!-- /container -->

<script>
(function() {
'use strict';

// ========== DOM refs ==========
const $ = id => document.getElementById(id);

const DOM = {
    modelName:       $('model_name'),
    apiUrl:          $('api_url'),
    tokenizerPath:   $('tokenizer_path'),
    apiKeyContainer: $('api-key-container'),
    addApiKeyBtn:    $('add-api-key-btn'),
    openclawPath:    $('openclaw_dataset_path'),
    openclawName:    $('openclaw_dataset_name'),
    testRepeats:     $('test_repeats'),
    logEveryN:       $('log_every_n_query'),
    prefixLength:    $('prefix_length'),
    waitBetween:     $('wait_between_tests'),
    ioContainer:     $('io-group-container'),
    crContainer:     $('cr-group-container'),
    addIoBtn:        $('add-io-btn'),
    addCrBtn:        $('add-cr-btn'),
    btnStart:        $('btn-start'),
    btnStop:         $('btn-stop'),
    btnRefresh:      $('btn-refresh'),
    stateLabel:      $('state-label'),
    progressFill:    $('progress-fill'),
    progressText:    $('progress-text'),
    progressEta:     $('progress-eta'),
    progressDetail:  $('progress-detail'),
    logBox:          $('log-box'),
    logCount:        $('log-count'),
};

// ========== dynamic row helpers ==========
function createApiKeyRow(value) {
    const div = document.createElement('div');
    div.className = 'dynamic-row';
    div.innerHTML = `
        <input class="api-key-input" type="password" value="${value || ''}" placeholder="sk-..." style="width:280px;">
        <button class="del-btn" title="删除">✕</button>
    `;
    div.querySelector('.del-btn').addEventListener('click', () => {
        // 至少保留一行
        if (DOM.apiKeyContainer.querySelectorAll('.dynamic-row').length > 1) {
            div.remove();
            saveToLS();
        }
    });
    div.querySelector('.api-key-input').addEventListener('input', () => saveToLS());
    return div;
}

function createIORow(inputVal, outputVal) {
    const div = document.createElement('div');
    div.className = 'dynamic-row';
    div.innerHTML = `
        <input class="io-input" type="number" min="1" value="${inputVal}" placeholder="输入">
        <span style="color:#999;font-size:.82rem;">→</span>
        <input class="io-output" type="number" min="1" value="${outputVal}" placeholder="输出">
        <button class="del-btn" title="删除">✕</button>
    `;
    div.querySelector('.del-btn').addEventListener('click', () => div.remove());
    return div;
}

function createCRRow(parallelVal, numberVal) {
    const div = document.createElement('div');
    div.className = 'dynamic-row';
    div.innerHTML = `
        <input class="cr-parallel" type="number" min="1" value="${parallelVal}" placeholder="并发">
        <span style="color:#999;font-size:.82rem;">→</span>
        <input class="cr-number" type="number" min="1" value="${numberVal}" placeholder="请求">
        <button class="del-btn" title="删除">✕</button>
    `;
    div.querySelector('.del-btn').addEventListener('click', () => div.remove());
    return div;
}

// 初始化默认行
function initDynamicRows() {
    // API Keys — 默认一行空输入
    DOM.apiKeyContainer.appendChild(createApiKeyRow(''));

    // IO groups — 用原脚本默认值
    const ioDefaults = [{input: 32768, output: 500}];
    ioDefaults.forEach(d => DOM.ioContainer.appendChild(createIORow(d.input, d.output)));

    // CR groups — 用原脚本默认值
    const crDefaults = [
        {parallel: 16, number: 80},
        {parallel: 32, number: 160},
        {parallel: 48, number: 240},
        {parallel: 64, number: 320},
        {parallel: 80, number: 400},
        {parallel: 96, number: 480},
        {parallel: 128, number: 640},
        {parallel: 144, number: 720},
        {parallel: 192, number: 960},
        {parallel: 256, number: 1280},
    ];
    crDefaults.forEach(d => DOM.crContainer.appendChild(createCRRow(d.parallel, d.number)));
}

DOM.addApiKeyBtn.addEventListener('click', () => {
    DOM.apiKeyContainer.appendChild(createApiKeyRow(''));
});
DOM.addIoBtn.addEventListener('click', () => {
    DOM.ioContainer.appendChild(createIORow('', ''));
});
DOM.addCrBtn.addEventListener('click', () => {
    DOM.crContainer.appendChild(createCRRow('', ''));
});

// ========== localStorage persistence ==========
const LS_KEY = 'eval_bench_demo_config';

function saveToLS() {
    const data = {
        modelName: DOM.modelName.value,
        apiUrl: DOM.apiUrl.value,
        tokenizerPath: DOM.tokenizerPath.value,
        apiKeys: [],
        openclawPath: DOM.openclawPath.value,
        openclawName: DOM.openclawName.value,
        testRepeats: DOM.testRepeats.value,
        logEveryN: DOM.logEveryN.value,
        prefixLength: DOM.prefixLength.value,
        waitBetween: DOM.waitBetween.value,
        ioRows: [],
        crRows: [],
        taskTypes: [],
    };
    DOM.apiKeyContainer.querySelectorAll('.api-key-input').forEach(inp => {
        data.apiKeys.push(inp.value);
    });
    DOM.ioContainer.querySelectorAll('.dynamic-row').forEach(row => {
        const inp = row.querySelector('.io-input');
        const out = row.querySelector('.io-output');
        if (inp && out) data.ioRows.push([inp.value, out.value]);
    });
    DOM.crContainer.querySelectorAll('.dynamic-row').forEach(row => {
        const p = row.querySelector('.cr-parallel');
        const n = row.querySelector('.cr-number');
        if (p && n) data.crRows.push([p.value, n.value]);
    });
    document.querySelectorAll('.task-type-cb').forEach(cb => {
        if (cb.checked) data.taskTypes.push(cb.value);
    });
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (_) {}
}

function loadFromLS() {
    let data;
    try { data = JSON.parse(localStorage.getItem(LS_KEY)); } catch (_) { return; }
    if (!data) return;
    if (data.modelName) DOM.modelName.value = data.modelName;
    if (data.apiUrl) DOM.apiUrl.value = data.apiUrl;
    if (data.tokenizerPath) DOM.tokenizerPath.value = data.tokenizerPath;

    // API Keys：兼容旧格式 apiKey (string) 和新格式 apiKeys (array)
    if (Array.isArray(data.apiKeys) && data.apiKeys.length) {
        DOM.apiKeyContainer.innerHTML = '';
        data.apiKeys.forEach(v => DOM.apiKeyContainer.appendChild(createApiKeyRow(v)));
    } else if (data.apiKey) {
        DOM.apiKeyContainer.innerHTML = '';
        DOM.apiKeyContainer.appendChild(createApiKeyRow(data.apiKey));
    }

    if (data.openclawPath) DOM.openclawPath.value = data.openclawPath;
    if (data.openclawName) DOM.openclawName.value = data.openclawName;
    if (data.testRepeats) DOM.testRepeats.value = data.testRepeats;
    if (data.logEveryN) DOM.logEveryN.value = data.logEveryN;
    if (data.prefixLength) DOM.prefixLength.value = data.prefixLength;
    if (data.waitBetween) DOM.waitBetween.value = data.waitBetween;

    if (Array.isArray(data.ioRows) && data.ioRows.length) {
        DOM.ioContainer.innerHTML = '';
        data.ioRows.forEach(([inp, out]) => DOM.ioContainer.appendChild(createIORow(inp, out)));
    }
    if (Array.isArray(data.crRows) && data.crRows.length) {
        DOM.crContainer.innerHTML = '';
        data.crRows.forEach(([p, n]) => DOM.crContainer.appendChild(createCRRow(p, n)));
    }
    if (Array.isArray(data.taskTypes) && data.taskTypes.length) {
        document.querySelectorAll('.task-type-cb').forEach(cb => {
            cb.checked = data.taskTypes.includes(cb.value);
        });
    }
}

// ========== collect form data ==========
function collectConfig() {
    const tt = [];
    document.querySelectorAll('.task-type-cb:checked').forEach(cb => tt.push(cb.value));
    const io = [];
    DOM.ioContainer.querySelectorAll('.dynamic-row').forEach(row => {
        const inp = parseInt(row.querySelector('.io-input').value, 10);
        const out = parseInt(row.querySelector('.io-output').value, 10);
        if (!isNaN(inp) && !isNaN(out)) io.push({input: inp, output: out});
    });
    const cr = [];
    DOM.crContainer.querySelectorAll('.dynamic-row').forEach(row => {
        const p = parseInt(row.querySelector('.cr-parallel').value, 10);
        const n = parseInt(row.querySelector('.cr-number').value, 10);
        if (!isNaN(p) && !isNaN(n)) cr.push({parallel: p, number: n});
    });
    // 收集所有 API Key
    const apiKeys = [];
    DOM.apiKeyContainer.querySelectorAll('.api-key-input').forEach(inp => {
        const v = inp.value.trim();
        if (v) apiKeys.push(v);
    });

    return {
        model_name: DOM.modelName.value.trim(),
        api_url: DOM.apiUrl.value.trim(),
        tokenizer_path: DOM.tokenizerPath.value.trim(),
        openai_api_keys: apiKeys,
        openclaw_dataset_path: DOM.openclawPath.value.trim(),
        openclaw_dataset_name: DOM.openclawName.value.trim(),
        test_repeats: parseInt(DOM.testRepeats.value, 10) || 3,
        log_every_n_query: parseInt(DOM.logEveryN.value, 10) || 500,
        prefix_length: parseInt(DOM.prefixLength.value, 10) || 0,
        wait_between_tests: parseInt(DOM.waitBetween.value, 10) || 60,
        task_types: tt,
        input_output_groups: io,
        concurrency_request_groups: cr,
    };
}

// ========== SSE log ==========
let eventSource = null;
let logLineCount = 0;

function connectSSE() {
    if (eventSource) return;
    eventSource = new EventSource('/stream');
    eventSource.onmessage = e => {
        if (!e.data) return;
        // 处理 \r 行（进度条行）
        const lines = e.data.split('\r').filter(Boolean);
        const last = lines.pop() || '';
        appendLog(last);
    };
    eventSource.onerror = () => {
        // 不自动重连 —— 避免后台任务结束后反复连
    };
}

function disconnectSSE() {
    if (eventSource) {
        eventSource.close();
        eventSource = null;
    }
}

function appendLog(text) {
    const cl = cssClass(text);
    const div = document.createElement('div');
    div.className = cl;
    div.textContent = text || ' ';
    DOM.logBox.appendChild(div);
    logLineCount++;
    DOM.logCount.textContent = logLineCount + ' 行';
    // 自动滚动到底
    DOM.logBox.scrollTop = DOM.logBox.scrollHeight;
}

function cssClass(text) {
    if (!text) return '';
    const t = text.trim();
    if (/^\s*$/.test(t)) return '';
    if (t.startsWith('=== ')) return 'hl';
    if (t.startsWith('[process') || t.startsWith('[reader') || t.startsWith('[stop')) return 'info';
    if (t.startsWith('✓') || t.startsWith('=') || /^创建/.test(t) || /^使用/.test(t)) return 'ok';
    if (t.startsWith('错误') || t.startsWith('✗') || t.startsWith('[error')) return 'err';
    return '';
}

function clearLog() {
    DOM.logBox.innerHTML = '';
    logLineCount = 0;
    DOM.logCount.textContent = '0 行';
}

// ========== progress polling ==========
let progressTimer = null;

function startProgressPoll() {
    stopProgressPoll();
    pollProgress();
    progressTimer = setInterval(pollProgress, 2000);
}

function stopProgressPoll() {
    if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
}

async function pollProgress() {
    try {
        const r = await fetch('/status');
        const data = await r.json();
        const f = data.fields || {};
        const pct = f._percent || '0';
        const cur = f._current || '0';
        const total = f._total || '0';
        DOM.progressFill.style.width = pct + '%';
        DOM.progressText.textContent = `${cur}/${total} (${pct}%)`;
        DOM.progressEta.textContent = f['预计剩余'] || '--';
        // detail 行
        const parts = [];
        if (f['用户数'] && f['用户数'] > 1) parts.push(`${f['用户数']}用户并发`);
        if (f['任务']) parts.push(f['任务']);
        if (f['IO配置']) parts.push(f['IO配置']);
        if (f['并发']) parts.push(f['并发']);
        if (f['重复']) parts.push(f['重复']);
        DOM.progressDetail.textContent = parts.join(' · ') || '';
    } catch (_) {}
}

// ========== state polling ==========
async function pollState() {
    try {
        const r = await fetch('/state');
        const data = await r.json();
        if (data.running) {
            DOM.stateLabel.textContent = '🟢 运行中';
            DOM.btnStart.disabled = true;
            DOM.btnStop.disabled = false;
        } else {
            DOM.stateLabel.textContent = '空闲';
            DOM.btnStart.disabled = false;
            DOM.btnStop.disabled = true;
        }
    } catch (_) {}
}

// ========== button handlers ==========
DOM.btnStart.addEventListener('click', async () => {
    saveToLS();
    const cfg = collectConfig();

    // 简单前端验证
    if (!cfg.openai_api_keys.length) { alert('请至少填写一个 API Key'); return; }
    if (!cfg.task_types.length) { alert('请至少选一项任务类型'); return; }
    DOM.tokenizerPath.classList.remove('error');
    if (cfg.task_types.includes('random') && !cfg.tokenizer_path) {
        DOM.tokenizerPath.classList.add('error');
        DOM.tokenizerPath.focus();
        alert('选择 random 任务时必须填写 Tokenizer 路径');
        return;
    }
    if (!cfg.input_output_groups.length) { alert('输入输出长度组至少需要一行'); return; }
    if (!cfg.concurrency_request_groups.length) { alert('并发请求组至少需要一行'); return; }

    // 禁用按钮
    DOM.btnStart.disabled = true;
    DOM.btnStop.disabled = true;
    clearLog();
    appendLog('=== 正在提交配置... ===');

    try {
        const r = await fetch('/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(cfg),
        });
        const data = await r.json();
        if (!data.ok) {
            appendLog(`[error] 启动失败: ${data.error}`);
            DOM.btnStart.disabled = false;
            return;
        }
        appendLog(`[info] 脚本已提交: ${data.script_path}`);
        appendLog('=== 等待日志... ===');

        // 连接 SSE
        disconnectSSE();
        connectSSE();
        startProgressPoll();
        pollState();  // 立即更新状态
    } catch (err) {
        appendLog(`[error] 网络错误: ${err.message}`);
        DOM.btnStart.disabled = false;
    } finally {
        // 轮询状态，直到 running=true 或超时
        let waited = 0;
        const id = setInterval(async () => {
            waited++;
            await pollState();
            if (DOM.btnStop.disabled === false) {  // running 了
                clearInterval(id);
            } else if (waited > 15) {
                clearInterval(id);
                DOM.btnStart.disabled = false;
            }
        }, 500);
    }
});

DOM.btnStop.addEventListener('click', async () => {
    DOM.btnStop.disabled = true;
    appendLog('[stop requested]');
    try {
        await fetch('/stop', {method: 'POST'});
    } catch (_) {}
    setTimeout(async () => {
        await pollState();
        stopProgressPoll();
    }, 1000);
});

DOM.btnRefresh.addEventListener('click', async () => {
    await pollState();
    await pollProgress();
});

// ========== debounced auto-save ==========
function setupAutoSave() {
    const inputs = document.querySelectorAll('input');
    const onInput = () => saveToLS();
    inputs.forEach(inp => inp.addEventListener('input', onInput));
    // 监听动态行增加
    const observer = new MutationObserver(() => saveToLS());
    observer.observe(DOM.apiKeyContainer, {childList: true});
    observer.observe(DOM.ioContainer, {childList: true});
    observer.observe(DOM.crContainer, {childList: true});
    // checkbox
    document.querySelectorAll('.task-type-cb').forEach(cb => cb.addEventListener('change', onInput));
}

// ========== init ==========
initDynamicRows();
loadFromLS();
setupAutoSave();
pollState();
})();
</script>
